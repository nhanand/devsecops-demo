
name: CI/CD Pipeline

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'kubernetes/**'

  pull_request:
    branches:
      - main

permissions:
  contents: write
  security-events: write

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/myapp
  IMAGE_TAG: sha-${{ github.sha }}

jobs:

  test:
    name: Unit Testing
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci
      - run: npm test || echo "No tests found"


  lint:
    name: Static Code Analysis
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci
      - run: npm run lint


  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test, lint]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci
      - run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: dist/
          if-no-files-found: error


  docker:
    name: Docker Build, Scan and Push
    runs-on: ubuntu-latest
    needs: [build]

    outputs:
      image_tag: ${{ steps.image_tag.outputs.image_tag }}

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build + Push in ONE step (fixes double build issue)
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          vuln-type: os,library

      - name: Set image tag output
        id: image_tag
        run: echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT


  update-k8s:
    name: Update Kubernetes Deployment
    runs-on: ubuntu-latest
    needs: [docker]

    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    env:
      IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/myapp
      IMAGE_TAG: ${{ needs.docker.outputs.image_tag }}

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.TOKEN }}
          fetch-depth: 0

      - name: Setup Git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Install yq
        run: |
          sudo wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 \
            -O /usr/local/bin/yq
          sudo chmod +x /usr/local/bin/yq

      - name: Update Kubernetes deployment
        run: |
          export NEW_IMAGE="${IMAGE_NAME}:${IMAGE_TAG}"
          echo "Updating image: ${NEW_IMAGE}"

          yq -i '.spec.template.spec.containers[0].image = strenv(NEW_IMAGE)' \
            kubernetes/deployment.yaml

          cat kubernetes/deployment.yaml

      - name: Commit and push changes
        run: |
          git add kubernetes/deployment.yaml

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Update K8s image ${IMAGE_TAG} [skip ci]"
          git fetch origin main
          git rebase origin/main
          git push origin HEAD:main
